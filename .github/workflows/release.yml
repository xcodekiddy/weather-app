name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app (NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --bundles nsis,msi
          tagName: ${{ github.ref_name }}
          releaseName: "Weather ${{ github.ref_name }}"
          releaseBody: |
            Windows installers for Weather.
            - `Weather_*_x64-setup.exe` — NSIS installer (recommended, smaller, per-user)
            - `Weather_*_x64_en-US.msi` — MSI installer (enterprise / group-policy)
            App is not code-signed, so SmartScreen may warn on first launch. Click "More info" → "Run anyway".
          releaseDraft: false
          prerelease: false

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
