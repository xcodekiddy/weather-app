<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://api.open-meteo.com" />
  <link rel="preconnect" href="https://geocoding-api.open-meteo.com" />
  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <div class="titlebar" data-tauri-drag-region aria-hidden="true">
    <span class="grip"></span>
  </div>

  <div class="blobs" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <main class="app">
    <header class="hero" data-window-drag data-tauri-drag-region>
      <div class="hero-top" data-tauri-drag-region>
        <div class="drag-title" data-tauri-drag-region>
          <h1 data-tauri-drag-region>Weather</h1>
        </div>
        <div class="unit-toggle" role="group" aria-label="Temperature unit" data-no-drag>
          <button type="button" data-unit="f" class="active">°F</button>
          <button type="button" data-unit="c">°C</button>
          <span class="unit-thumb" aria-hidden="true"></span>
        </div>
      </div>
      <div class="search-wrap">
        <form id="search-form" class="search" role="search" autocomplete="off" data-no-drag>
          <button type="button" id="locate-btn" class="locate" aria-label="Use my current location" title="Use my current location">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <circle cx="12" cy="12" r="8"></circle>
              <line x1="12" y1="1" x2="12" y2="4"></line>
              <line x1="12" y1="20" x2="12" y2="23"></line>
              <line x1="1" y1="12" x2="4" y2="12"></line>
              <line x1="20" y1="12" x2="23" y2="12"></line>
            </svg>
          </button>
          <input
            id="search-input"
            type="text"
            name="city"
            placeholder="Search for a city…"
            aria-label="City"
            aria-autocomplete="list"
            aria-controls="suggestions"
            aria-expanded="false"
            role="combobox"
            required
          />
          <button type="submit" class="submit" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </form>
        <ul id="suggestions" class="suggestions card" role="listbox" hidden data-no-drag></ul>
      </div>
    </header>

    <section id="status" class="status" aria-live="polite"></section>

    <section id="current" class="current card" hidden>
      <div class="current-top">
        <div>
          <h2 id="location" class="location"></h2>
          <p id="local-time" class="local-time"></p>
        </div>
        <div id="icon" class="icon" aria-hidden="true"></div>
      </div>
      <div class="current-mid">
        <p class="temperature"><span id="temp"></span><span class="deg">°</span></p>
        <p id="condition" class="condition"></p>
      </div>
      <dl class="details">
        <div><dt>Feels like</dt><dd id="feels"></dd></div>
        <div><dt>Humidity</dt><dd id="humidity"></dd></div>
        <div><dt>Wind</dt><dd id="wind"></dd></div>
        <div><dt>Precipitation</dt><dd id="precip"></dd></div>
      </dl>
    </section>

    <section id="hourly" class="hourly" hidden>
      <h3>Next 24 hours</h3>
      <ul id="hourly-list" class="hourly-list card"></ul>
    </section>

    <section id="forecast" class="forecast" hidden>
      <h3>7-day forecast</h3>
      <ul id="forecast-list" class="forecast-list card"></ul>
    </section>

    <footer class="footer">
      <small>Data: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></small>
      <small class="oss">
        This project is completely open source —
        <a href="https://github.com/xcodekiddy/weather-app" target="_blank" rel="noopener">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="vertical-align:-2px;margin-right:4px">
            <path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.57.1.78-.25.78-.55v-1.94c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.56-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.19 1.18a11 11 0 0 1 5.8 0c2.22-1.49 3.18-1.18 3.18-1.18.64 1.59.24 2.77.12 3.06.74.8 1.19 1.83 1.19 3.09 0 4.43-2.68 5.4-5.24 5.69.41.35.78 1.04.78 2.1v3.11c0 .3.21.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/>
          </svg>View on GitHub
        </a>
      </small>
    </footer>
  </main>

  <script src="app.js?v=7"></script>
</body>
</html>
